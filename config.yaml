providers:
  openai:
    default_model: "gpt-4o-mini"
  deepseek:
    default_model: "deepseek-chat"
  anthropic:
    default_model: "claude-3-5-sonnet-latest"
  groq:
    default_model: "llama-3.3-70b-versatile"
  ollama:
    endpoint: "http://localhost:11434"
    default_model: "llama3"

scraper:
  use_playwright_fallback: true  # Set to true to enable headless browser for JS-heavy sites
  max_pages: 5                    # Max subpages to crawl (Phase 9J-2)
  max_depth: 2                    # Max crawl depth from homepage (Phase 9J-2)

defaults:
  provider: "deepseek"
  model: null

report_output_dir: "reports"

modules:
  company_profile:
    provider: "deepseek"
    model: null
  seo_keywords:
    provider: "deepseek"
    model: null
  competitor:
    provider: "deepseek"
    model: null
  social_content:
    provider: "deepseek"
    model: null
  swot:
    provider: "deepseek"
    model: null

llm_cache:
  enabled: true
  path: ".reconiq-cache/llm"

search:
  enabled: true
  provider: "firecrawl"
  max_results: 5
  firecrawl:
    api_url: "https://api.firecrawl.dev"
    api_key: "${FIRECRAWL_API_KEY}"
